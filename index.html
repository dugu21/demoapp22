<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>영주 선비숨결 스탬프 투어</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --forest: #1B3A2A; --amber: #E8B84B; --cream: #F7F2E8; --gold: #C9972A; --warm: #8B7355; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            width: 100%; height: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .app { width: 100%; height: 100%; height: 100dvh; position: relative; }
        .page { display: none; position: absolute; inset: 0; flex-direction: column; z-index: 1; }
        .page.active { display: flex; }

        @keyframes pulse { 0%{opacity:0.6;} 50%{opacity:1;} 100%{opacity:0.6;} }
        .pulse { animation: pulse 2s infinite; }
        @keyframes dashAnim { to { stroke-dashoffset: -22; } }

        /* ── 첫 번째 페이지 ── */
        #page-slider { background: #000; overflow: hidden; }

        /* ── 두 번째 페이지 ── */
        #page-auth { display: none; position: absolute; inset: 0; }
        #page-auth.active { display: block; }
        #shared-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }

        .header {
            position: relative; z-index: 10;
            background: linear-gradient(180deg, rgba(27,58,42,0.92) 0%, rgba(27,58,42,0.5) 100%);
            padding: max(50px, calc(env(safe-area-inset-top, 20px) + 20px)) 20px 16px;
            text-align: center;
        }
        .header h2 { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--amber); letter-spacing: 3px; }
        .header p { color: rgba(255,255,255,0.65); font-size: 12px; margin-top: 4px; letter-spacing: 1px; }

        .form-panel {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            padding: 20px 20px max(44px, env(safe-area-inset-bottom, 20px));
            background: rgba(247, 242, 232, 0.55); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
        }
        .form-panel input {
            display: block; width: 100%; padding: 16px 18px; margin-bottom: 10px;
            border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.6);
            background: rgba(255, 255, 255, 0.55); color: #1B3A2A; font-size: 16px; outline: none;
        }
        .form-panel button {
            width: 100%; padding: 18px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, var(--amber) 0%, var(--gold) 100%);
            color: var(--forest); font-weight: 900; font-size: 18px; font-family: 'Noto Serif KR', serif;
            box-shadow: 0 4px 20px rgba(232,184,75,0.4);
        }
        .form-panel button:disabled { background: rgba(180,170,150,0.7); color: rgba(255,255,255,0.6); box-shadow: none; }
